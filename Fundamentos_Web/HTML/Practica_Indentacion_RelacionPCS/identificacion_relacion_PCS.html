<!DOCTYPE html>

<!-- <html> Padre -->
<html>

    <!-- <head> es hijo de <html>, hermano de <body> y padre de <title> -->
    <head>

        <!-- <title> es hijo de <head> -->
        <title>Mis Favoritos</title>

    </head>

    <!-- <body> es hijo de <html>, hermano de <head> y padre de <table>, <h1> y <ul> -->
    <body>

        <!-- <table> hijo de <body>, hermano de <h1> y <ul>, y padre de <thead> y <tbody> -->
        <table>

            <!-- <thead> es hijo de <table>, hermano de <tbody> y padre de <tr> -->
            <thead>

                <!-- <tr> es hijo de <thead> y padre de <th> -->
                <tr>

                    <!-- <th> es hijo de <tr> y hermano con las otras etiquetas <th> -->
                    <th>Producto</th>
                    <th>Marca</th>
                    <th>Precio</th>
                </tr>
            </thead>

            <!-- <tbody> es hijo de <table>, hermano de <thead> y padre de 3 etiquetas <tr> -->
            <tbody>

                <!-- <tr> es hijo de <tbody>, hermano de las otras etiquetas <tr> y padre de <td> -->
                <tr>

                    <!-- <td> es hijo de <tr> y hermano de las otras etiquetas <td> -->
                    <td>iPhone</td>
                    <td>Apple</td>
                    <td>$1000</td>
                </tr>

                <tr>
                    <td>Xbox</td>
                    <td>Microsoft</td>
                    <td>$500</td>
                </tr>
                <tr>
                    <td>Adidas</td>
                    <td>Deportivas</td>
                    <td>$80</td>
                </tr>
            </tbody>
        </table>

        <!-- <h1> hijo de <body> y hermano de <table> y <ul> -->
        <h1>Mis Lugares Favoritos para Visitar:</h1>

        <!-- <ul> hijo de <body> y hermano de <table> y <h1> -->
        <ul>

            <!-- <li> son hijos de <ul> y hermanos de las otras etiquetas <li> -->
            <li>Tokyo</li>
            <li>París</li>
            <li>Río de Janeiro</li>
            <li>Sydney</li>
        </ul>
    </body>
</html>
